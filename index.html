<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solwit Square</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      canvas {
        display: block;
      }


      /* Settings panel */
      #settings-panel {
        display: none;
        position: fixed;
        top: 70px;
        right: 20px;
        width: 240px;
        padding: 20px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(12px);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        z-index: 10;
      }
      #settings-panel.open {
        display: block;
      }
      #settings-panel label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
      }
      #settings-panel .slider-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #settings-panel input[type="range"] {
        flex: 1;
        accent-color: #fff;
      }
      #settings-panel .slider-value {
        min-width: 28px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      #settings-panel .stepper-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #settings-panel .stepper-row button {
        width: 30px;
        height: 30px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #settings-panel .stepper-row button:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      #settings-panel .stepper-row button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      #settings-panel .stepper-value {
        min-width: 28px;
        text-align: center;
        font-variant-numeric: tabular-nums;
        font-size: 16px;
      }
      #settings-panel .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
      }
      #settings-panel .checkbox-row input {
        accent-color: #fff;
        width: 16px;
        height: 16px;
      }
      /* Credit button & modal */
      #top-buttons {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 8px;
        z-index: 10;
      }
      #top-buttons button {
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #top-buttons button:hover {
        background: rgba(0, 0, 0, 0.7);
      }
      #credit-btn {
        color: #fff;
        font-size: 20px;
        font-family: Georgia, serif;
        font-style: italic;
      }
      #settings-btn svg {
        width: 22px;
        height: 22px;
        fill: #fff;
      }
      #credit-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      #credit-overlay.open {
        display: flex;
      }
      #credit-box {
        max-width: 480px;
        padding: 32px;
        border-radius: 14px;
        background: #000;
        color: #fff;
        font-family: Georgia, "Times New Roman", serif;
        text-align: center;
        line-height: 1.7;
      }
      #credit-box h2 {
        font-size: 18px;
        font-weight: 400;
        margin-bottom: 16px;
        letter-spacing: 0.04em;
      }
      #credit-box p {
        font-size: 14px;
        margin-bottom: 12px;
        color: #ccc;
      }
      #credit-box a {
        color: #fff;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      #credit-box button {
        margin-top: 18px;
        padding: 8px 24px;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 6px;
        background: transparent;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
      }
      #credit-box button:hover {
        background: rgba(255,255,255,0.15);
      }

      #fps-hint {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 20px;
        border-radius: 8px;
        background: rgba(30, 30, 30, 0.8);
        backdrop-filter: blur(8px);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        z-index: 10;
        pointer-events: none;
      }

      /* Mobile WASD pad */
      #mobile-wasd {
        display: none;
        position: fixed;
        bottom: 30px;
        left: 30px;
        z-index: 20;
        user-select: none;
        -webkit-user-select: none;
      }
      #mobile-wasd .wasd-row {
        display: flex;
        justify-content: center;
      }
      #mobile-wasd button {
        width: 52px;
        height: 52px;
        margin: 3px;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 10px;
        background: rgba(0,0,0,0.5);
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: pointer;
        touch-action: manipulation;
      }
      #mobile-wasd button:active {
        background: rgba(255,255,255,0.3);
      }
    </style>
  </head>
  <body>
    <div id="top-buttons">
      <button id="credit-btn" aria-label="Credits">i</button>
      <button id="screenshot-btn" aria-label="Screenshot">
        <svg viewBox="0 0 24 24" fill="#fff" width="22" height="22"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3z"/></svg>
      </button>
      <button id="settings-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94c0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.3.59.22l2.39-.96c.5.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
      </button>
    </div>
    <div id="settings-panel">
      <label>Size</label>
      <div class="stepper-row">
        <button id="size-down" aria-label="Decrease size">-</button>
        <span class="stepper-value" id="size-value">5</span>
        <button id="size-up" aria-label="Increase size">+</button>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="fps-toggle" />
        <label for="fps-toggle">FPS Camera</label>
      </div>
      <div class="checkbox-row" id="hide-wasd-row" style="display: none;">
        <input type="checkbox" id="hide-wasd-toggle" />
        <label for="hide-wasd-toggle">Hide WASD</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="rt-toggle" checked />
        <label for="rt-toggle">Shadows</label>
      </div>
      <label style="margin-top: 14px;">Light X</label>
      <div class="slider-row">
        <input type="range" id="light-x-slider" min="-60" max="60" value="6" />
        <span class="slider-value" id="light-x-value">6</span>
      </div>
      <label style="margin-top: 8px;">Light Z</label>
      <div class="slider-row">
        <input type="range" id="light-z-slider" min="-60" max="60" value="6" />
        <span class="slider-value" id="light-z-value">6</span>
      </div>
      <label style="margin-top: 14px;">Camera Height (cm)</label>
      <div class="slider-row">
        <input type="range" id="height-slider" min="100" max="250" value="180" />
        <span class="slider-value" id="height-value">180</span>
      </div>
    </div>
    <div id="credit-overlay">
      <div id="credit-box">
        <h2>Credits</h2>
        <p>This entire project was completely inspired by the artwork of</p>
        <p style="color: #fff; font-size: 16px; margin-bottom: 4px;"><strong>Sol LeWitt</strong></p>
        <p><a href="https://en.wikipedia.org/wiki/Sol_LeWitt" target="_blank" rel="noopener">en.wikipedia.org/wiki/Sol_LeWitt</a></p>
        <p style="margin-top: 16px; font-style: italic;">"Structure (One, Two, Three, Four, Five as a Square)"<br>(1978&ndash;80)</p>
        <button id="credit-close">Close</button>
      </div>
    </div>
    <div id="fps-hint">Click to start FPS mode — WASD to move, mouse to look, P to screenshot, ESC to exit</div>
    <div id="mobile-wasd">
      <div class="wasd-row">
        <button data-key="KeyW">W</button>
      </div>
      <div class="wasd-row">
        <button data-key="KeyA">A</button>
        <button data-key="KeyS">S</button>
        <button data-key="KeyD">D</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
